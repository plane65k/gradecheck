<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard+</title>
    <link id="favicon" rel="icon" type="image/png" href="https://cuhsd.instructure.com/apple-touch-icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #fafafa; 
            --primary: #E33E2B; 
            --text: #202124; 
            --text-light: #5f6368;
            --card: #ffffff; 
            --border: #eaebed; 
            --radius: 16px;
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            font-weight: 300; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 40px 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            line-height: 1.5;
        }

        /* Loading Bar */
        .loading-bar-container {
            width: 100%; height: 4px; background: transparent;
            position: fixed; top: 0; left: 0; z-index: 2000; overflow: hidden; display: none;
        }
        .loading-bar {
            width: 50%; height: 100%; background: var(--primary);
            position: absolute; left: -50%;
            animation: loading-animation 0.7s infinite ease-in-out;
        }
        @keyframes loading-animation {
            0% { left: -50%; width: 10%; }
            20% { width: 60%; }
            50% { width: 40%; }
            80% { width: 20%; }
            100% { left: 100%; width: 10%; }
        }
        
        /* Widened container for side-by-side layout */
        .dashboard-container { width: 100%; max-width: 1100px; }
        
        /* Top Bar */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .logo-area img { height: 45px; border-radius: 8px; }
        .top-bar h1 { margin: 0; font-weight: 400; font-size: 1.8em; letter-spacing: -0.5px; }
        
        .settings-btn { 
            background: white; color: var(--text-light); border: 1px solid var(--border); 
            padding: 10px 18px; border-radius: 20px; cursor: pointer; font-weight: 400; 
            font-family: 'Inter', sans-serif; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .settings-btn:hover { border-color: #ccc; color: var(--text); }

        /* Controls Card */
        .controls-card { 
            background: var(--card); padding: 30px; border-radius: var(--radius); 
            border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.03); 
            margin-bottom: 40px; transition: all 0.3s ease; 
        }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-weight: 500; margin-bottom: 8px; font-size: 0.9em; color: var(--text-light); }
        input[type="text"] { 
            width: 100%; padding: 14px; border: 1px solid var(--border); 
            border-radius: 8px; box-sizing: border-box; font-size: 16px; 
            font-family: 'Inter', sans-serif; font-weight: 300; background: #fdfdfd;
        }
        input[type="text"]:focus { outline: none; border-color: var(--primary); }
        
        button.action-btn { 
            background-color: var(--primary); color: white; border: none; 
            padding: 14px 24px; font-size: 16px; border-radius: 8px; 
            cursor: pointer; font-weight: 500; font-family: 'Inter', sans-serif; 
            width: 100%; transition: opacity 0.2s; 
        }
        button.action-btn:hover { opacity: 0.9; }
        button.action-btn:disabled { background-color: #ccc; cursor: not-allowed; }
        .error { color: #d9534f; margin-top: 15px; font-weight: 500; text-align: center; font-size: 0.9em; }
        
        /* Two-Column App Layout */
        .app-layout {
            display: flex; gap: 30px; align-items: flex-start; width: 100%;
        }
        
        /* Sidebar Styles */
        .sidebar {
            width: 320px; flex-shrink: 0; display: flex; flex-direction: column; gap: 15px;
        }
        .sidebar-item { 
            background: var(--card); border-radius: 12px; 
            border: 2px solid var(--border); box-shadow: 0 2px 8px rgba(0,0,0,0.02); 
            padding: 20px; cursor: pointer; transition: all 0.2s; user-select: none; 
        }
        .sidebar-item:hover { background: #fbfbfb; border-color: #ddd; transform: translateY(-2px); }
        .sidebar-item.active { border-color: var(--primary); background: #fff; box-shadow: 0 4px 15px rgba(227, 62, 43, 0.1); }
        
        .sidebar-title { margin: 0 0 12px 0; font-weight: 500; font-size: 1.1em; color: var(--text); line-height: 1.3; }
        .sidebar-meta { display: flex; justify-content: space-between; align-items: center; }
        
        .course-grade { 
            font-size: 1.05em; font-weight: 500; color: var(--primary); 
            background: rgba(227, 62, 43, 0.05); padding: 6px 14px; border-radius: 20px; 
        }
        .term-label { font-size: 0.75em; color: var(--text-light); font-weight: 400; text-align: right; }

        /* Main View Styles */
        .main-view {
            flex-grow: 1; background: var(--card); border-radius: var(--radius); 
            border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.02); 
            overflow: hidden; min-height: 400px;
        }
        
        .course-pane { display: none; }
        .course-pane.active { display: block; animation: fadeIn 0.3s ease; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .pane-header { padding: 25px; border-bottom: 1px solid var(--border); background: #fafafa; }
        .pane-header h2 { margin: 0; font-size: 1.5em; font-weight: 400; color: var(--text); }

        /* Tabs System */
        .course-tabs { display: flex; background: #fdfdfd; border-bottom: 1px solid var(--border); }
        .tab-btn { 
            flex: 1; padding: 14px; border: none; background: none; cursor: pointer; 
            font-family: 'Inter', sans-serif; font-size: 0.95em; font-weight: 400; 
            color: var(--text-light); transition: 0.2s; border-bottom: 2px solid transparent;
        }
        .tab-btn:hover { background: #f5f5f5; color: var(--text); }
        .tab-btn.active { color: var(--primary); border-bottom: 2px solid var(--primary); font-weight: 500; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Lists */
        .assignments-list, .module-list { padding: 0; margin: 0; list-style: none; }
        .assignment-item { 
            padding: 18px 25px; border-bottom: 1px solid var(--border); 
            display: flex; justify-content: space-between; align-items: center; 
            cursor: pointer; transition: background 0.2s; 
        }
        .assignment-item:hover { background-color: #fcfcfc; }
        .assignment-item:last-child { border-bottom: none; }
        
        .assignment-info { display: flex; flex-direction: column; gap: 4px;}
        .assignment-name { font-weight: 400; color: var(--text); font-size: 0.95em; }
        .assignment-status { font-size: 0.75em; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
        .status-unsubmitted { color: #d9534f; }
        .status-submitted { color: #f0ad4e; }
        .status-graded { color: #5cb85c; }
        .assignment-date { font-size: 0.75em; color: var(--text-light); margin-top: 2px; }

        .assignment-score { 
            font-weight: 500; color: var(--text-light); font-size: 0.9em; 
            background: #f1f3f4; padding: 6px 12px; border-radius: 6px; white-space: nowrap;
        }

        /* Module Styles */
        .module-header { 
            padding: 12px 25px; background: #f8f9fa; font-weight: 500; 
            font-size: 0.9em; color: var(--text); border-bottom: 1px solid var(--border); 
        }
        .module-item { 
            padding: 14px 25px 14px 40px; border-bottom: 1px solid var(--border); 
            font-size: 0.9em; display: flex; text-decoration: none; color: var(--text-light); 
            transition: background 0.2s; align-items: center; gap: 10px;
        }
        .module-item:hover { background: #fcfcfc; color: var(--primary); }
        .module-item:last-child { border-bottom: none; }
        .module-type { font-size: 0.7em; background: #eee; padding: 3px 6px; border-radius: 4px; text-transform: uppercase; }

        .no-data { padding: 40px 30px; text-align: center; color: var(--text-light); font-weight: 300; display: block !important; }
        #emptySelection { display: flex; align-items: center; justify-content: center; height: 100%; min-height: 400px; font-size: 1.1em; color: #999; }

        /* Modal */
        .modal-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.8); backdrop-filter: blur(5px); 
            justify-content: center; align-items: center; z-index: 1000; padding: 20px; box-sizing: border-box;
        }
        .modal-content { 
            background: white; padding: 40px; border-radius: var(--radius); max-width: 700px; 
            width: 100%; max-height: 80vh; overflow-y: auto; position: relative; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); border: 1px solid var(--border);
        }
        .close-btn { position: absolute; top: 20px; right: 25px; font-size: 28px; font-weight: 300; color: #999; cursor: pointer; border: none; background: none; }
        .close-btn:hover { color: var(--text); }
        .modal-title { margin-top: 0; color: var(--text); font-weight: 400; border-bottom: 1px solid var(--border); padding-bottom: 15px; font-size: 1.5em; }
        .modal-body { margin-top: 25px; line-height: 1.7; color: var(--text-light); font-weight: 300; }
        .modal-body img { max-width: 100%; height: auto; border-radius: 8px; }
        .submit-link-btn { 
            display: inline-block; margin-top: 30px; background: var(--text); color: white; 
            padding: 14px 24px; text-decoration: none; border-radius: 8px; font-weight: 400; 
            text-align: center; transition: opacity 0.2s; 
        }
        .submit-link-btn:hover { opacity: 0.8; }

        /* Responsive */
        @media (max-width: 768px) {
            .app-layout { flex-direction: column; }
            .sidebar { width: 100%; }
            #emptySelection { display: none; }
        }
    </style>
</head>
<body>

    <div id="loadingBarContainer" class="loading-bar-container">
        <div class="loading-bar"></div>
    </div>

    <div class="dashboard-container">
        
        <div class="top-bar">
            <div class="logo-area">
                <img id="dynamicLogo" src="https://cuhsd.instructure.com/apple-touch-icon.png" alt="Canvas Logo">
                <h1>Dashboard+</h1>
            </div>
            <button class="settings-btn" onclick="toggleSettings()">Settings</button>
        </div>

        <div id="controlsCard" class="controls-card">
            <div class="input-group">
                <label for="canvasDomain">Canvas Domain</label>
                <input type="text" id="canvasDomain" value="cuhsd.instructure.com">
            </div>
            <div class="input-group">
                <label for="apiToken">API Access Token</label>
                <input type="text" id="apiToken" placeholder="Paste your Canvas token here">
            </div>
            <button id="fetchBtn" class="action-btn" onclick="loadEverything()">Authenticate & Load</button>
            <div id="errorMessage" class="error"></div>
        </div>

        <div id="results"></div>
    </div>

    <div id="assignmentModal" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="closeModal(true)">&times;</button>
            <h2 id="modalTitle" class="modal-title">Assignment Name</h2>
            <div id="modalBody" class="modal-body"></div>
            <a id="modalSubmitLink" href="#" target="_blank" class="submit-link-btn">Open in Canvas</a>
        </div>
    </div>

    <script>
        const CLOUDFLARE_WORKER_URL = 'https://canvas-proxy.567394.workers.dev/';

        document.addEventListener('DOMContentLoaded', () => {
            const savedDomain = localStorage.getItem('canvasDomain');
            const savedToken = localStorage.getItem('apiToken');
            
            if (savedDomain) {
                document.getElementById('canvasDomain').value = savedDomain;
                updateLogos(savedDomain);
            }
            
            if (savedToken) {
                document.getElementById('apiToken').value = savedToken;
                document.getElementById('controlsCard').style.display = 'none';
                loadEverything();
            }
        });

        function updateLogos(domain) {
            const iconUrl = `https://${domain}/apple-touch-icon.png`;
            document.getElementById('dynamicLogo').src = iconUrl;
            document.getElementById('favicon').href = iconUrl;
        }

        function toggleSettings() {
            const card = document.getElementById('controlsCard');
            card.style.display = (card.style.display === 'none' || card.style.display === '') ? 'block' : 'none';
        }

        function selectCourse(courseId) {
            // Update Sidebar Items UI
            document.querySelectorAll('.sidebar-item').forEach(item => item.classList.remove('active'));
            const selectedItem = document.getElementById(`sidebar-item-${courseId}`);
            if(selectedItem) selectedItem.classList.add('active');

            // Update Main View Content
            document.querySelectorAll('.course-pane').forEach(pane => pane.classList.remove('active'));
            document.getElementById('emptySelection').style.display = 'none';
            
            const selectedPane = document.getElementById(`pane-${courseId}`);
            if(selectedPane) selectedPane.classList.add('active');
        }

        function switchTab(event, courseId, tabName) {
            const pane = document.getElementById(`pane-${courseId}`);
            
            pane.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            pane.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(`tab-${tabName}-${courseId}`).classList.add('active');
        }

        async function fetchFromCanvas(endpoint) {
            const domain = document.getElementById('canvasDomain').value.trim();
            const token = document.getElementById('apiToken').value.trim();

            const response = await fetch(CLOUDFLARE_WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: token, domain: domain, endpoint: endpoint })
            });

            if (!response.ok) throw new Error("Server error or invalid token.");
            const data = await response.json();
            if (data.errors) throw new Error(data.errors[0].message || "Canvas API Error");
            
            return data;
        }

        async function loadEverything() {
            const domain = document.getElementById('canvasDomain').value.trim();
            const token = document.getElementById('apiToken').value.trim();
            const resultsDiv = document.getElementById('results');
            const errorDiv = document.getElementById('errorMessage');
            const btn = document.getElementById('fetchBtn');
            const loadingBar = document.getElementById('loadingBarContainer');
            
            if (!token) {
                errorDiv.innerText = "Please enter your API token.";
                return;
            }

            localStorage.setItem('canvasDomain', domain);
            localStorage.setItem('apiToken', token);
            updateLogos(domain);
            document.getElementById('controlsCard').style.display = 'none';

            resultsDiv.innerHTML = '';
            errorDiv.innerHTML = '';
            btn.innerText = "Loading...";
            btn.disabled = true;
            loadingBar.style.display = 'block';

            try {
                const coursesEndpoint = '/api/v1/courses?enrollment_state=active&include[]=total_scores&include[]=current_grading_period_scores&include[]=term&per_page=100';
                const courses = await fetchFromCanvas(coursesEndpoint);
                
                if (courses.length === 0) {
                    resultsDiv.innerHTML = '<div class="no-data">No active courses found.</div>';
                    return;
                }

                resultsDiv.innerHTML = `
                    <div class="app-layout" id="appLayout">
                        <div class="sidebar" id="sidebar"></div>
                        <div class="main-view" id="mainView">
                            <div id="emptySelection">Select a class from the left to view details.</div>
                        </div>
                    </div>
                `;

                const sidebar = document.getElementById('sidebar');
                const mainView = document.getElementById('mainView');

                for (const course of courses) {
                    if (!course.name || course.access_restricted_by_date) continue;

                    let courseGrade = "N/A";
                    let termName = course.term ? course.term.name : "Current Term";

                    if (course.enrollments && course.enrollments.length > 0) {
                        const enrollment = course.enrollments[0];
                        let score = enrollment.current_period_computed_current_score ?? enrollment.computed_current_score;
                        let letter = enrollment.current_period_computed_current_grade ?? enrollment.computed_current_grade;

                        if (score !== null && score !== undefined) {
                            courseGrade = `${score}% ${letter ? `(${letter})` : ''}`;
                        }
                    }

                    // Build Sidebar Item
                    const sidebarItem = document.createElement('div');
                    sidebarItem.className = 'sidebar-item';
                    sidebarItem.id = `sidebar-item-${course.id}`;
                    sidebarItem.onclick = () => selectCourse(course.id);
                    sidebarItem.innerHTML = `
                        <h2 class="sidebar-title">${course.name}</h2>
                        <div class="sidebar-meta">
                            <div class="course-grade">${courseGrade}</div>
                            <span class="term-label">${termName}</span>
                        </div>
                    `;
                    sidebar.appendChild(sidebarItem);

                    // Build Main Pane
                    const coursePane = document.createElement('div');
                    coursePane.className = 'course-pane';
                    coursePane.id = `pane-${course.id}`;
                    coursePane.innerHTML = `
                        <div class="pane-header">
                            <h2>${course.name}</h2>
                        </div>
                        <div class="course-tabs">
                            <button class="tab-btn active" onclick="switchTab(event, '${course.id}', 'assignments')">Assignments & Tasks</button>
                            <button class="tab-btn" onclick="switchTab(event, '${course.id}', 'modules')">Modules & Materials</button>
                        </div>
                        
                        <div id="tab-assignments-${course.id}" class="tab-content active">
                            <ul class="assignments-list" id="assignments-${course.id}">
                                <li class="no-data">Loading assignments...</li>
                            </ul>
                        </div>
                        
                        <div id="tab-modules-${course.id}" class="tab-content">
                            <ul class="module-list" id="modules-${course.id}">
                                <li class="no-data">Loading modules...</li>
                            </ul>
                        </div>
                    `;
                    mainView.appendChild(coursePane);

                    // Fetch Assignments & Tasks (Includes quizzes, tests, discussions, etc.)
                    try {
                        const assignmentsEndpoint = `/api/v1/courses/${course.id}/assignments?include[]=submission&per_page=100`;
                        let assignments = await fetchFromCanvas(assignmentsEndpoint);
                        const listElement = document.getElementById(`assignments-${course.id}`);
                        listElement.innerHTML = ''; 

                        if (!assignments || assignments.length === 0) {
                            listElement.innerHTML = '<li class="no-data">No tasks or assignments found.</li>';
                        } else {
                            // STRICT SORT: Latest on top, no due date pinned to bottom
                            assignments.sort((a, b) => {
                                if (!a.due_at && b.due_at) return 1;
                                if (a.due_at && !b.due_at) return -1;
                                if (!a.due_at && !b.due_at) return 0;
                                
                                const dateA = new Date(a.due_at).getTime();
                                const dateB = new Date(b.due_at).getTime();
                                return dateB - dateA; // Descending order (latest/future first)
                            });

                            assignments.forEach(assign => {
                                const sub = assign.submission || {};
                                const score = sub.score !== null && sub.score !== undefined ? sub.score : '-';
                                const maxPoints = assign.points_possible !== null && assign.points_possible !== undefined ? assign.points_possible : '-';
                                const gradeText = `${score} / ${maxPoints}`;

                                let statusText = "Graded";
                                let statusClass = "status-graded";
                                
                                if (!sub.workflow_state || sub.workflow_state === 'unsubmitted') {
                                    statusText = "Not Done";
                                    statusClass = "status-unsubmitted";
                                } else if (sub.workflow_state === 'submitted' || sub.workflow_state === 'pending_review') {
                                    statusText = "Submitted (Ungraded)";
                                    statusClass = "status-submitted";
                                }

                                const rawDate = assign.due_at ? new Date(assign.due_at) : null;
                                const dateString = rawDate ? rawDate.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' }) : 'No Due Date';

                                const li = document.createElement('li');
                                li.className = 'assignment-item';
                                const safeDescription = encodeURIComponent(assign.description || "<i>No details provided.</i>");
                                const link = assign.html_url;

                                li.innerHTML = `
                                    <div class="assignment-info">
                                        <span class="assignment-name">${assign.name}</span>
                                        <span class="assignment-status ${statusClass}">${statusText}</span>
                                        <span class="assignment-date">Due: ${dateString}</span>
                                    </div>
                                    <span class="assignment-score">${gradeText}</span>
                                `;
                                
                                li.onclick = () => openModal(assign.name, safeDescription, link);
                                listElement.appendChild(li);
                            });
                        }
                    } catch (err) {
                        document.getElementById(`assignments-${course.id}`).innerHTML = '<li class="no-data" style="color:#d9534f;">Failed to load assignments.</li>';
                    }

                    // Fetch Modules
                    try {
                        const modulesEndpoint = `/api/v1/courses/${course.id}/modules?include[]=items&per_page=100`;
                        const modules = await fetchFromCanvas(modulesEndpoint);
                        const modElement = document.getElementById(`modules-${course.id}`);
                        modElement.innerHTML = '';

                        if (!modules || modules.length === 0) {
                            modElement.innerHTML = '<li class="no-data">No modules found.</li>';
                        } else {
                            modules.forEach(mod => {
                                const modHeader = document.createElement('li');
                                modHeader.className = 'module-header';
                                modHeader.innerText = mod.name;
                                modElement.appendChild(modHeader);

                                if (mod.items && mod.items.length > 0) {
                                    mod.items.forEach(item => {
                                        const li = document.createElement('li');
                                        const link = item.html_url || '#';
                                        let niceType = item.type;
                                        if (item.type === 'File') niceType = 'Document';
                                        if (item.type === 'Assignment') niceType = 'Task';
                                        if (item.type === 'Page') niceType = 'Page';

                                        li.innerHTML = `
                                            <a href="${link}" target="_blank" class="module-item">
                                                <span class="module-type">${niceType}</span>
                                                ${item.title}
                                            </a>
                                        `;
                                        modElement.appendChild(li);
                                    });
                                }
                            });
                        }
                    } catch(err) {
                        document.getElementById(`modules-${course.id}`).innerHTML = '<li class="no-data" style="color:#d9534f;">Failed to load modules.</li>';
                    }
                }

            } catch (error) {
                console.error(error);
                errorDiv.innerText = `Error: ${error.message}`;
                resultsDiv.innerHTML = '';
                document.getElementById('controlsCard').style.display = 'block';
            } finally {
                btn.innerText = "Authenticate & Load";
                btn.disabled = false;
                loadingBar.style.display = 'none';
            }
        }

        function openModal(title, encodedDesc, url) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalBody').innerHTML = decodeURIComponent(encodedDesc);
            document.getElementById('modalSubmitLink').href = url;
            document.getElementById('assignmentModal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeModal(force = false) {
            if (force === true || event.target.id === 'assignmentModal') {
                document.getElementById('assignmentModal').style.display = 'none';
                document.body.style.overflow = 'auto';
            }
        }
    </script>

<footer>
  <p>plane65k.github.io --- KC studios</p>
</footer>
</body>
</html>
