<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Canvas Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #fafafa; 
            --primary: #E33E2B; /* Official Canvas Red */
            --text: #202124; 
            --text-light: #5f6368;
            --card: #ffffff; 
            --border: #eaebed; 
            --radius: 16px;
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            font-weight: 300; /* Thin font */
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 40px 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            line-height: 1.5;
        }
        
        .dashboard-container { width: 100%; max-width: 900px; }
        
        /* Modern Top Bar */
        .top-bar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 40px; 
        }
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .logo-area img { height: 45px; border-radius: 8px; }
        .top-bar h1 { margin: 0; font-weight: 400; font-size: 1.8em; letter-spacing: -0.5px; }
        
        .settings-btn { 
            background: white; color: var(--text-light); border: 1px solid var(--border); 
            padding: 10px 18px; border-radius: 20px; cursor: pointer; font-weight: 400; 
            font-family: 'Inter', sans-serif; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .settings-btn:hover { border-color: #ccc; color: var(--text); }

        /* Controls Card */
        .controls-card { 
            background: var(--card); padding: 30px; border-radius: var(--radius); 
            border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.03); 
            margin-bottom: 40px; transition: all 0.3s ease; 
        }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-weight: 500; margin-bottom: 8px; font-size: 0.9em; color: var(--text-light); }
        input[type="text"] { 
            width: 100%; padding: 14px; border: 1px solid var(--border); 
            border-radius: 8px; box-sizing: border-box; font-size: 16px; 
            font-family: 'Inter', sans-serif; font-weight: 300; background: #fdfdfd;
        }
        input[type="text"]:focus { outline: none; border-color: var(--primary); }
        
        button.action-btn { 
            background-color: var(--primary); color: white; border: none; 
            padding: 14px 24px; font-size: 16px; border-radius: 8px; 
            cursor: pointer; font-weight: 500; font-family: 'Inter', sans-serif; 
            width: 100%; transition: opacity 0.2s; 
        }
        button.action-btn:hover { opacity: 0.9; }
        button.action-btn:disabled { background-color: #ccc; cursor: not-allowed; }
        .error { color: #d9534f; margin-top: 15px; font-weight: 500; text-align: center; font-size: 0.9em; }
        
        /* Clean Course Cards */
        .course-card { 
            background: var(--card); border-radius: var(--radius); 
            border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.02); 
            margin-bottom: 25px; overflow: hidden; 
        }
        .course-header { 
            padding: 25px; display: flex; justify-content: space-between; 
            align-items: center; cursor: pointer; transition: background 0.2s; user-select: none; 
        }
        .course-header:hover { background: #fbfbfb; }
        .course-title-area { display: flex; align-items: center; gap: 15px; }
        .course-title-area h2 { margin: 0; font-weight: 400; font-size: 1.3em; color: var(--text); }
        .toggle-icon { font-size: 0.9em; color: #aaa; transition: transform 0.2s; }
        
        .course-grade { 
            font-size: 1.1em; font-weight: 500; color: var(--primary); 
            background: rgba(227, 62, 43, 0.05); padding: 8px 18px; border-radius: 20px; 
        }
        .term-label { font-size: 0.75em; color: var(--text-light); font-weight: 400; margin-top: 4px; display: block; text-align: right; }
        
        /* Assignments List */
        .assignments-list { padding: 0; margin: 0; list-style: none; display: none; border-top: 1px solid var(--border); }
        .assignment-item { 
            padding: 18px 25px; border-bottom: 1px solid var(--border); 
            display: flex; justify-content: space-between; align-items: center; 
            cursor: pointer; transition: background 0.2s; 
        }
        .assignment-item:hover { background-color: #fcfcfc; }
        .assignment-item:last-child { border-bottom: none; }
        .assignment-name { font-weight: 400; color: var(--text); font-size: 0.95em; }
        .assignment-score { 
            font-weight: 500; color: var(--text-light); font-size: 0.9em; 
            background: #f1f3f4; padding: 6px 12px; border-radius: 6px; 
        }
        .no-data { padding: 30px; text-align: center; color: var(--text-light); font-weight: 300; display: block !important; }

        /* Modern Modal */
        .modal-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.8); backdrop-filter: blur(5px); 
            justify-content: center; align-items: center; z-index: 1000; padding: 20px; box-sizing: border-box;
        }
        .modal-content { 
            background: white; padding: 40px; border-radius: var(--radius); max-width: 700px; 
            width: 100%; max-height: 80vh; overflow-y: auto; position: relative; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); border: 1px solid var(--border);
        }
        .close-btn { position: absolute; top: 20px; right: 25px; font-size: 28px; font-weight: 300; color: #999; cursor: pointer; border: none; background: none; }
        .close-btn:hover { color: var(--text); }
        .modal-title { margin-top: 0; color: var(--text); font-weight: 400; border-bottom: 1px solid var(--border); padding-bottom: 15px; font-size: 1.5em; }
        .modal-body { margin-top: 25px; line-height: 1.7; color: var(--text-light); font-weight: 300; }
        .modal-body img { max-width: 100%; height: auto; border-radius: 8px; }
        .submit-link-btn { 
            display: inline-block; margin-top: 30px; background: var(--text); color: white; 
            padding: 14px 24px; text-decoration: none; border-radius: 8px; font-weight: 400; 
            text-align: center; transition: opacity 0.2s; 
        }
        .submit-link-btn:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <div class="dashboard-container">
        
        <div class="top-bar">
            <div class="logo-area">
                <img id="dynamicLogo" src="https://cuhsd.instructure.com/apple-touch-icon.png" alt="Canvas Logo">
                <h1>Grades Dashboard</h1>
            </div>
            <button class="settings-btn" onclick="toggleSettings()">Settings</button>
        </div>

        <div id="controlsCard" class="controls-card">
            <div class="input-group">
                <label for="canvasDomain">Canvas Domain</label>
                <input type="text" id="canvasDomain" value="cuhsd.instructure.com">
            </div>
            <div class="input-group">
                <label for="apiToken">API Access Token</label>
                <input type="text" id="apiToken" placeholder="Paste your Canvas token here">
            </div>
            <button id="fetchBtn" class="action-btn" onclick="loadEverything()">Authenticate & Load</button>
            <div id="errorMessage" class="error"></div>
        </div>

        <div id="results"></div>
    </div>

    <div id="assignmentModal" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="closeModal(true)">&times;</button>
            <h2 id="modalTitle" class="modal-title">Assignment Name</h2>
            <div id="modalBody" class="modal-body"></div>
            <a id="modalSubmitLink" href="#" target="_blank" class="submit-link-btn">Open in Canvas</a>
        </div>
    </div>

    <script>
        const CLOUDFLARE_WORKER_URL = 'https://canvas-proxy.567394.workers.dev/';

        document.addEventListener('DOMContentLoaded', () => {
            const savedDomain = localStorage.getItem('canvasDomain');
            const savedToken = localStorage.getItem('apiToken');
            
            if (savedDomain) {
                document.getElementById('canvasDomain').value = savedDomain;
                document.getElementById('dynamicLogo').src = `https://${savedDomain}/apple-touch-icon.png`;
            }
            
            if (savedToken) {
                document.getElementById('apiToken').value = savedToken;
                document.getElementById('controlsCard').style.display = 'none';
                loadEverything();
            }
        });

        function toggleSettings() {
            const card = document.getElementById('controlsCard');
            card.style.display = (card.style.display === 'none' || card.style.display === '') ? 'block' : 'none';
        }

        function toggleCourse(courseId) {
            const list = document.getElementById(`assignments-${courseId}`);
            const icon = document.getElementById(`icon-${courseId}`);
            
            if (list.style.display === 'none' || list.style.display === '') {
                list.style.display = 'block';
                icon.innerHTML = '▼'; 
            } else {
                list.style.display = 'none';
                icon.innerHTML = '▶'; 
            }
        }

        async function fetchFromCanvas(endpoint) {
            const domain = document.getElementById('canvasDomain').value.trim();
            const token = document.getElementById('apiToken').value.trim();

            const response = await fetch(CLOUDFLARE_WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: token, domain: domain, endpoint: endpoint })
            });

            if (!response.ok) throw new Error("Server error or invalid token.");
            const data = await response.json();
            if (data.errors) throw new Error(data.errors[0].message || "Canvas API Error");
            
            return data;
        }

        async function loadEverything() {
            const domain = document.getElementById('canvasDomain').value.trim();
            const token = document.getElementById('apiToken').value.trim();
            const resultsDiv = document.getElementById('results');
            const errorDiv = document.getElementById('errorMessage');
            const btn = document.getElementById('fetchBtn');
            
            if (!token) {
                errorDiv.innerText = "Please enter your API token.";
                return;
            }

            localStorage.setItem('canvasDomain', domain);
            localStorage.setItem('apiToken', token);
            document.getElementById('dynamicLogo').src = `https://${domain}/apple-touch-icon.png`;
            document.getElementById('controlsCard').style.display = 'none';

            resultsDiv.innerHTML = '<div class="no-data">Fetching current semester data...</div>';
            errorDiv.innerHTML = '';
            btn.innerText = "Loading...";
            btn.disabled = true;

            try {
                // IMPORTANT API CHANGE: Now asks Canvas specifically for the current grading period and term data
                const coursesEndpoint = '/api/v1/courses?enrollment_state=active&include[]=total_scores&include[]=current_grading_period_scores&include[]=term&per_page=100';
                const courses = await fetchFromCanvas(coursesEndpoint);
                resultsDiv.innerHTML = ''; 
                
                if (courses.length === 0) {
                    resultsDiv.innerHTML = '<div class="no-data">No active courses found.</div>';
                    return;
                }

                for (const course of courses) {
                    if (!course.name || course.access_restricted_by_date) continue;

                    // STRICT SEMESTER GRADING LOGIC
                    let courseGrade = "N/A";
                    let termName = course.term ? course.term.name : "Current Term";

                    if (course.enrollments && course.enrollments.length > 0) {
                        const enrollment = course.enrollments[0];
                        // Prioritize the Current Grading Period over the historical overall score
                        const score = enrollment.current_period_computed_current_score || enrollment.computed_current_score;
                        const letter = enrollment.current_period_computed_current_grade || enrollment.computed_current_grade;
                        
                        if (score) courseGrade = `${score}% ${letter ? `(${letter})` : ''}`;
                    }

                    const courseCard = document.createElement('div');
                    courseCard.className = 'course-card';
                    courseCard.innerHTML = `
                        <div class="course-header" onclick="toggleCourse('${course.id}')">
                            <div class="course-title-area">
                                <span id="icon-${course.id}" class="toggle-icon">▶</span>
                                <h2>${course.name}</h2>
                            </div>
                            <div>
                                <div class="course-grade">${courseGrade}</div>
                                <span class="term-label">${termName}</span>
                            </div>
                        </div>
                        <ul class="assignments-list" id="assignments-${course.id}">
                            <li class="no-data" style="display:block;">Loading assignments...</li>
                        </ul>
                    `;
                    resultsDiv.appendChild(courseCard);

                    try {
                        const submissionsEndpoint = `/api/v1/courses/${course.id}/students/submissions?student_ids[]=self&include[]=assignment&per_page=100`;
                        const submissions = await fetchFromCanvas(submissionsEndpoint);
                        
                        const listElement = document.getElementById(`assignments-${course.id}`);
                        listElement.innerHTML = ''; 

                        if (!submissions || submissions.length === 0) {
                            listElement.innerHTML = '<li class="no-data" style="display:block;">No graded assignments found.</li>';
                            continue;
                        }

                        submissions.forEach(sub => {
                            if (!sub.assignment) return;
                            
                            const score = sub.score !== null ? sub.score : '-';
                            const maxPoints = sub.assignment.points_possible !== null ? sub.assignment.points_possible : '-';
                            const gradeText = `${score} / ${maxPoints}`;

                            const li = document.createElement('li');
                            li.className = 'assignment-item';
                            const safeDescription = encodeURIComponent(sub.assignment.description || "<i>No details provided.</i>");
                            const link = sub.assignment.html_url;

                            li.innerHTML = `
                                <span class="assignment-name">${sub.assignment.name}</span>
                                <span class="assignment-score">${gradeText}</span>
                            `;
                            
                            li.onclick = () => openModal(sub.assignment.name, safeDescription, link);
                            listElement.appendChild(li);
                        });

                    } catch (err) {
                        document.getElementById(`assignments-${course.id}`).innerHTML = '<li class="no-data" style="color:#d9534f; display:block;">Failed to load assignments.</li>';
                    }
                }

            } catch (error) {
                console.error(error);
                errorDiv.innerText = `Error: ${error.message}`;
                resultsDiv.innerHTML = '';
                document.getElementById('controlsCard').style.display = 'block';
            } finally {
                btn.innerText = "Authenticate & Load";
                btn.disabled = false;
            }
        }

        function openModal(title, encodedDesc, url) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalBody').innerHTML = decodeURIComponent(encodedDesc);
            document.getElementById('modalSubmitLink').href = url;
            document.getElementById('assignmentModal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeModal(force = false) {
            if (force === true || event.target.id === 'assignmentModal') {
                document.getElementById('assignmentModal').style.display = 'none';
                document.body.style.overflow = 'auto';
            }
        }
    </script>
</body>
</html>
